<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post['title'] }} - Indian Legends</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>{{ post['title'] }}</h1>
            <a href="{{ url_for('index') }}" class="back-btn">← Back to All Legends</a>
        </div>
    </header>

    <main class="detail-container">
        <article class="full-post">
            <div class="post-meta">
                <span class="date">Legendary History | Added on {{ post['created'] }}</span>
            </div>
            
            <div class="post-body">
                <p>{{ post['content'] }}</p>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 Indian Legends Project</p>
    </footer>

</body>
</html>
